<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Rising Academy</title>

<!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"> -->

<style>
*{
    margin:0; 
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}


body{
    background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#0f2027);
    background-size:400% 400%;
    animation:gradientBG 15s ease infinite;
    color:white;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Header */
header{
    padding:20px 10%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

header h1{
    font-weight:700;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

nav a:hover{
    color:#00f2ff;
}

/* Contact Section */
.contact-section{
    padding:100px 10%;
}

.glass-card{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:50px;
    backdrop-filter:blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.37);
}

.contact-container{
    display:flex;
    flex-wrap:wrap;
    gap:40px;
}

.contact-form{
    flex:1;
    min-width:280px;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px 15px;
    margin-bottom:15px;
    border-radius:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

.contact-form input::placeholder,
.contact-form textarea::placeholder{
    color:#ffffff;
    opacity:0.8;
}

.contact-form textarea{
    resize:none;
    height:120px;
}

.btn{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:linear-gradient(to right,#00f2ff,#4facfe);
    cursor:pointer;
    font-weight:500;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00f2ff;
}

/* Contact Info */
.contact-info{
    flex:1;
    min-width:280px;
}

.contact-info h3{
    margin-bottom:20px;
}

.contact-info p{
    margin-bottom:10px;
    opacity:0.9;
}

/* Footer */
footer{
    text-align:center;
    padding:30px;
    background:rgba(0,0,0,0.5);
    margin-top:60px;
    opacity:0.8;
}

@media(max-width:768px){
    .contact-container{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<header>
    <h1>Rising Academy</h1>
    <nav>
        <a href="Index.html">Home</a>
        <a href="About.html">About</a>
        <a href="Course.html">Courses</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="contact-section">
    <div class="glass-card">
        <h2 style="text-align:center;margin-bottom:40px;">Get In Touch</h2>

        <div class="contact-container">

            <!-- Contact Form -->
            <div class="contact-form">
                
                <!-- <form onsubmit="showPopup(event)">
            
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea placeholder="Your Message" required></textarea>
                    <button class="btn" type="submit">Send Message</button>
                </form> -->
                <form id="contactForm">

<!-- <input type="text" name="name" placeholder="Your Name" required> -->
<!-- <input type="email" name="email" placeholder="Your Email" required> -->
<!-- <textarea name="message" placeholder="Your Message" required></textarea> -->






<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<textarea id="message" placeholder="Your Message" required></textarea>
<button class="btn" type="submit">Send Message</button>
</form>
            </div>

            <!-- Contact Info -->
            <div class="contact-info">
                <h3>Contact Information</h3>
                <p><strong>Email:</strong> info@risingacademy.com</p>
                <p><strong>Phone:</strong> +91 8529000544</p>
                <p><strong>Address:</strong> Shiv Chowk, Near Alka Hospital, Gharaunda, Karnal, Haryana</p>
            </div>

        </div>
    </div>
    
</section>

<footer>
    © 2026 Rising Academy | All Rights Reserved
</footer>
<!-- Success Popup -->
<div id="popup" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
color:white;
padding:30px 50px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
z-index:2000;
text-align:center;
">
    <h3>✅ Message Sent Successfully!</h3>
    <br>
    <button onclick="closePopup()" style="
        padding:10px 25px;
        border:none;
        border-radius:20px;
        background:linear-gradient(to right,#00f2ff,#4facfe);
        cursor:pointer;
    ">OK</button>
</div>
</body>

function showPopup(event){
    event.preventDefault(); // stop page refresh
    document.getElementById("popup").style.display="block";

    document.getElementById("popup").style.display="none";

<script>

document.getElementById("contactForm").addEventListener("submit", async function(e){

e.preventDefault();

const name = document.querySelector("input[name='name']").value;
const email = document.querySelector("input[name='email']").value;
const message = document.querySelector("textarea[name='message']").value;

const response = await fetch("https://rising-academy.onrender.com/contact",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
message
})

});

document.getElementById("popup").style.display="block";

});
</script>

</html>
