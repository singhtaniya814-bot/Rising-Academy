<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission | Rising Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#0f2027);
background-size:400% 400%;
animation:gradientBG 15s ease infinite;
color:white;
min-height:100vh;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Background Circles */

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.07);
animation:float 6s infinite ease-in-out;
}

.circle1{
width:220px;
height:220px;
top:10%;
left:8%;
}

.circle2{
width:260px;
height:260px;
bottom:10%;
right:10%;
animation-delay:2s;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* Header */

header{
padding:20px 10%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#00f2ff;
}

/* Form Section */

.form-section{
padding:80px 10%;
display:flex;
justify-content:center;
}

/* Glass Card */

.form-card{
background:rgba(255,255,255,0.08);
padding:50px;
border-radius:20px;
width:100%;
max-width:700px;
backdrop-filter:blur(20px);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.form-card h2{
text-align:center;
margin-bottom:35px;
font-size:30px;
background:linear-gradient(to right,#00f2ff,#4facfe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Inputs */

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:6px;
font-size:14px;
opacity:0.9;
}

.form-group input,
.form-group select{
width:100%;
padding:13px 15px;
border:none;
border-radius:10px;
outline:none;
background:rgba(255,255,255,0.12);
color:white;
transition:0.3s;
font-size:14px;
}

.form-group input::placeholder{
color:#ddd;
}

.form-group input:focus,
.form-group select:focus{
background:rgba(255,255,255,0.18);
box-shadow:0 0 10px #00f2ff;
}

/* Select Options */

select option{
color:black;
}

/* Button */

.btn{
width:100%;
padding:15px;
border:none;
border-radius:40px;
background:linear-gradient(to right,#00f2ff,#4facfe);
cursor:pointer;
font-size:16px;
font-weight:600;
transition:0.4s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00f2ff;
}

/* Footer */

footer{
text-align:center;
padding:30px;
background:rgba(0,0,0,0.5);
margin-top:60px;
font-size:14px;
opacity:0.8;
}
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background:#0b1624;
padding:30px 50px;
border-radius:15px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.popup-box h3{
margin-bottom:20px;
}

.popup-box button{
padding:10px 25px;
border:none;
border-radius:20px;
background:linear-gradient(to right,#00f2ff,#4facfe);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<header>
<h2>Rising Academy</h2>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="course.html">Courses</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="form-section">

<div class="form-card">

<h2>Student Admission Form</h2>

<form id="admissionForm">

<div class="form-group">
<label>Student Name</label>
<!-- <input type="text" required> -->
<input type="text" name="studentName" required>
</div>

<div class="form-group">
<label>Father Name</label>
<input type="text" name="fathernName" required>
</div>

<div class="form-group">
<label>Email ID</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" name="Phone" required>
</div>

<div class="form-group">
<label>Location</label>
<input type="text"name="Location" required>
</div>

<div class="form-group">
<label>Qualification</label>
<select required>
<option value="">Select Qualification</option>
<option>Primary</option>
<option>Under Secondary</option>
<option>10th</option>
<option>11th</option>
<option>12th</option>
<option>Graduation</option>
<option>Masters</option>
</select>
</div>

<div class="form-group">
<label>Status</label>
<select required>
<option value="">Select Status</option>
<option>Student</option>
<option>Employed</option>
<option>Unemployed</option>
</select>
</div>

<div class="form-group">
<label>Course You Want</label>
<select required>
<option value="">Select Course</option>
<option>Full Stack Development</option>
<option>Python Programming</option>
<option>Basic Computer</option>
<option>Tally</option>
<option>Graphic Design</option>
<option>Video Editing</option>
</select>
</div>

<button class="btn" type="submit">Submit Admission</button>

</form>

</div>
<!-- <div class="popup" id="successPopup"> -->
</section>
<div id="successPopup" class="popup">
  <div class="popup-box">
    <h3>✅ Admission Submitted Successfully!</h3>
    <button onclick="closePopup()">OK</button>
  </div>
</div>
<footer>
© 2026 Rising Academy | All Rights Reserved
</footer>

<script>

// document.getElementById("admissionForm").addEventListener("submit",function(e){

// e.preventDefault();

// alert("Admission Form Submitted Successfully!");

// });
document.getElementById("admissionForm").addEventListener("submit",function(e){

e.preventDefault();

document.getElementById("successPopup").style.display="flex";

this.reset();

});

function closePopup(){
document.getElementById("successPopup").style.display="none";
}
</script>

</body>
</html>
